name: UVM Verification CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build_and_simulate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Icarus Verilog
      run: |
        sudo apt-get update
        sudo apt-get install -y iverilog grep
    
    - name: Lint RTL Code
      run: |
        echo "Running basic Icarus Compilation Syntax Check on RTL..."
        iverilog -g2012 -tnull rtl/apb_ram.v
      
    - name: Lint Testbench Interface
      run: |
        echo "Running Syntax Check on SystemVerilog Interface..."
        iverilog -g2012 -tnull tb/uvm/apb_if.sv

    - name: EDA Playground Note
      run: |
        echo "=========================================================="
        echo "NOTE: Full UVM 1.2 simulation is not officially supported "
        echo "by standard Icarus Verilog environments on GitHub Actions."
        echo "The complete UVM testbench compiles and runs natively "
        echo "using Cadence Xcelium via EDA Playground."
        echo "=========================================================="
